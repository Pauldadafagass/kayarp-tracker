<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KayaRP - Live Spieleranzahl</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #1a1a1a;
            --accent: #ff4757;
            --accent2: #ff6b81;
            --text: #ffffff;
            --text2: #aaaaaa;
            --border: #2a2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            background-image:
                    radial-gradient(ellipse at top, rgba(255,71,87,0.15), transparent 50%),
                    radial-gradient(ellipse at bottom, rgba(255,107,129,0.1), transparent 50%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 500px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
        }

        .logo {
            font-size: 64px;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: var(--text);
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .server-name {
            color: var(--accent2);
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .status-pill.online {
            background: rgba(46, 213, 115, 0.15);
            color: #2ed573;
            border: 1px solid rgba(46, 213, 115, 0.3);
        }

        .status-pill.offline {
            background: rgba(255, 71, 87, 0.15);
            color: #ff4757;
            border: 1px solid rgba(255, 71, 87, 0.3);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .player-count-section {
            background: linear-gradient(135deg, rgba(255,71,87,0.1), rgba(255,107,129,0.05));
            border: 2px solid rgba(255,71,87,0.2);
            border-radius: 20px;
            padding: 40px 20px;
            margin: 20px 0;
        }

        .player-number {
            font-size: 120px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 5px;
        }

        .player-label {
            color: var(--text2);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }

        .info-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            text-align: left;
        }

        .info-label {
            color: #666;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .info-value {
            color: var(--text);
            font-size: 18px;
            font-weight: 700;
        }

        .info-value.code {
            color: var(--accent2);
            font-family: 'Courier New', monospace;
            font-size: 14px;
            word-break: break-all;
        }

        .join-button {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            text-decoration: none;
            padding: 16px 40px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            margin: 15px 0;
            transition: all 0.3s;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .join-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,71,87,0.4);
        }

        .update-info {
            color: #444;
            font-size: 12px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .update-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #2ed573;
            animation: pulse 2s infinite;
        }

        .error-card {
            background: rgba(255,71,87,0.1);
            border: 1px solid rgba(255,71,87,0.3);
            border-radius: 14px;
            padding: 16px;
            margin-top: 15px;
            color: #ff4757;
            font-size: 13px;
            line-height: 1.5;
        }

        /* Loading Animation */
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,71,87,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 25px 20px;
            }
            h1 {
                font-size: 24px;
            }
            .player-number {
                font-size: 80px;
            }
            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">🚓</div>
    <h1>KayaRP</h1>
    <div class="server-name">Private Server</div>

    <div id="statusPill" class="status-pill online">
        <span class="status-dot"></span>
        <span>LÄDT...</span>
    </div>

    <div class="player-count-section">
        <div id="playerNumber" class="player-number">
            <div class="spinner"></div>
        </div>
        <div class="player-label">Spieler Online</div>
    </div>

    <div class="info-grid">
        <div class="info-card">
            <div class="info-label">Server Code</div>
            <div class="info-value code" id="infoCode">5ihdm3h6org3g7</div>
        </div>
        <div class="info-card">
            <div class="info-label">Max Spieler</div>
            <div class="info-value" id="infoMax">--</div>
        </div>
        <div class="info-card">
            <div class="info-label">Spiel ID</div>
            <div class="info-value" id="infoPlaceId">--</div>
        </div>
        <div class="info-card">
            <div class="info-label">Aktualisiert</div>
            <div class="info-value" id="infoTime" style="font-size:14px;">--</div>
        </div>
    </div>

    <a id="joinButton" href="#" target="_blank" class="join-button">
        🎮 Server Beitreten
    </a>

    <div class="update-info">
        <span class="update-dot"></span>
        <span>Live • Alle 30 Sekunden</span>
    </div>

    <div id="errorContainer"></div>
</div>

<script>
    // KayaRP Server Code
    const SERVER_CODE = '5ihdm3h6org3g7';
    const SHARE_LINK = `https://www.roblox.com/share?v=v2&code=${SERVER_CODE}`;

    let updateInterval;

    // Spieleranzahl von unserem Server abrufen
    async function fetchPlayerCount() {
        try {
            const response = await fetch(`/api/player-count?code=${SERVER_CODE}`);
            const data = await response.json();
            return data;
        } catch (error) {
            console.error('Fetch Fehler:', error);
            throw error;
        }
    }

    // UI aktualisieren
    async function updateUI() {
        const playerNumberEl = document.getElementById('playerNumber');
        const statusPill = document.getElementById('statusPill');
        const infoCode = document.getElementById('infoCode');
        const infoMax = document.getElementById('infoMax');
        const infoPlaceId = document.getElementById('infoPlaceId');
        const infoTime = document.getElementById('infoTime');
        const joinButton = document.getElementById('joinButton');
        const errorContainer = document.getElementById('errorContainer');

        try {
            const data = await fetchPlayerCount();

            if (data.success) {
                // Spieleranzahl
                playerNumberEl.textContent = data.playerCount;

                // Status
                if (data.playerCount > 0) {
                    statusPill.className = 'status-pill online';
                    statusPill.innerHTML = '<span class="status-dot"></span><span>ONLINE</span>';
                } else {
                    statusPill.className = 'status-pill offline';
                    statusPill.innerHTML = '<span class="status-dot"></span><span>LEER</span>';
                }

                // Info Cards
                infoCode.textContent = data.code;
                infoMax.textContent = data.maxPlayers;
                infoPlaceId.textContent = data.placeId || '--';

                // Zeit
                const time = new Date(data.timestamp);
                infoTime.textContent = time.toLocaleTimeString('de-DE', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });

                // Join Button
                joinButton.href = data.shareLink;

                // Fehler löschen
                errorContainer.innerHTML = '';

            } else {
                throw new Error(data.error || 'Unbekannter Fehler');
            }

        } catch (error) {
            console.error('UI Update Fehler:', error);

            playerNumberEl.textContent = '--';
            statusPill.className = 'status-pill offline';
            statusPill.innerHTML = '<span class="status-dot"></span><span>FEHLER</span>';

            errorContainer.innerHTML = `
                    <div class="error-card">
                        ⚠️ <strong>Keine Verbindung</strong><br>
                        ${error.message}<br>
                        <small>Bitte versuche es später erneut.</small>
                    </div>
                `;

            const now = new Date();
            infoTime.textContent = now.toLocaleTimeString('de-DE', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }
    }

    // Starte Auto-Update
    function startAutoUpdate() {
        updateUI(); // Sofort ausführen
        updateInterval = setInterval(updateUI, 30000); // Alle 30 Sekunden
    }

    // Initialisierung
    window.addEventListener('load', () => {
        // Join Button setzen
        document.getElementById('joinButton').href = SHARE_LINK;
        document.getElementById('infoCode').textContent = SERVER_CODE;

        startAutoUpdate();
    });

    // Aufräumen
    window.addEventListener('beforeunload', () => {
        if (updateInterval) clearInterval(updateInterval);
    });
</script>
</body>
</html>
