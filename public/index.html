<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaya RP - Live Spieleranzahl</title>
    <meta property="og:title" content="Kaya RP - Spieleranzahl">
    <meta property="og:description" content="Live Spieleranzahl für Kaya RP">
    <meta name="theme-color" content="#0066ff">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #06060d;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: 
                radial-gradient(ellipse at 50% 0%, rgba(0,102,255,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(0,50,200,0.05) 0%, transparent 50%);
        }

        .container {
            background: #0d0d16;
            border: 1px solid #1a1a2e;
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.6),
                0 0 100px rgba(0,102,255,0.05);
            text-align: center;
            max-width: 500px;
            width: 100%;
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 30px;
            right: 30px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #0066ff, #4488ff, transparent);
        }

        .game-icon {
            font-size: 72px;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(0,102,255,0.3));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        h1 {
            color: #ffffff;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 2px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #4488ff;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }

        .server-code-badge {
            display: inline-block;
            background: rgba(0,102,255,0.1);
            color: #6699ff;
            padding: 5px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border: 1px solid rgba(0,102,255,0.2);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }

        .status-badge.live {
            background: rgba(46, 213, 115, 0.1);
            color: #2ed573;
            border: 1px solid rgba(46, 213, 115, 0.25);
        }

        .status-badge.empty {
            background: rgba(255, 165, 0, 0.1);
            color: #ffa500;
            border: 1px solid rgba(255, 165, 0, 0.25);
        }

        .status-badge.error {
            background: rgba(255, 50, 50, 0.1);
            color: #ff4444;
            border: 1px solid rgba(255, 50, 50, 0.25);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: currentColor;
        }

        .status-badge.live .status-dot {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.8); }
        }

        .counter-box {
            background: linear-gradient(135deg, rgba(0,102,255,0.08), rgba(0,60,200,0.03));
            border: 2px solid rgba(0,102,255,0.2);
            border-radius: 24px;
            padding: 35px 20px;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }

        .counter-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0,102,255,0.05) 0%, transparent 70%);
            animation: rotate 15s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .player-number {
            font-size: 140px;
            font-weight: 900;
            background: linear-gradient(180deg, #4d94ff 0%, #0066ff 50%, #0044cc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 5px;
            position: relative;
            z-index: 1;
            transition: all 0.5s ease;
        }

        .player-label {
            color: #5577aa;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 5px;
            position: relative;
            z-index: 1;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }

        .info-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid #1c1c2e;
            border-radius: 14px;
            padding: 16px;
            text-align: left;
            transition: all 0.3s;
        }

        .info-item:hover {
            border-color: #2a2a45;
        }

        .info-label {
            color: #556;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .info-value {
            color: #fff;
            font-size: 17px;
            font-weight: 700;
        }

        .info-value.code {
            color: #6699ff;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            word-break: break-all;
            letter-spacing: 1px;
        }

        .join-btn {
            display: inline-block;
            background: linear-gradient(135deg, #0066ff, #0044cc);
            color: white;
            text-decoration: none;
            padding: 16px 38px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            margin: 12px 0;
            transition: all 0.3s;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
        }

        .join-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0,102,255,0.35);
            background: linear-gradient(135deg, #1a75ff, #0055dd);
        }

        .join-btn:active {
            transform: translateY(-1px);
        }

        .refresh-footer {
            color: #3a3a50;
            font-size: 11px;
            margin-top: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .refresh-indicator {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #2ed573;
            animation: pulse 2s infinite;
        }

        .error-box {
            background: rgba(255,50,50,0.05);
            border: 1px solid rgba(255,50,50,0.2);
            border-radius: 12px;
            padding: 14px;
            margin-top: 15px;
            color: #ff5555;
            font-size: 12px;
            line-height: 1.6;
            text-align: left;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0,102,255,0.1);
            border-top-color: #0066ff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 500px) {
            .container {
                padding: 25px 18px;
            }
            h1 {
                font-size: 26px;
            }
            .player-number {
                font-size: 100px;
            }
            .info-grid {
                grid-template-columns: 1fr;
            }
            .game-icon {
                font-size: 56px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-icon">🚨</div>
        <h1>KayaRP VC</h1>
        <div class="subtitle">Roleplay Server</div>
        <div class="server-code-badge" id="serverCodeBadge">x1qssipp</div>
        
        <div id="statusDisplay" class="status-badge live">
            <span class="status-dot"></span>
            <span>VERBINDE...</span>
        </div>

        <div class="counter-box">
            <div id="countDisplay" class="player-number">
                <div class="spinner"></div>
            </div>
            <div class="player-label">Spieler Online</div>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <div class="info-label">Maximale Spieler</div>
                <div class="info-value" id="infoMax">--</div>
            </div>
            <div class="info-item">
                <div class="info-label">Server Code</div>
                <div class="info-value code">x1qssipp</div>
            </div>
            <div class="info-item">
                <div class="info-label">Besuche Gesamt</div>
                <div class="info-value" id="infoVisits">--</div>
            </div>
            <div class="info-item">
                <div class="info-label">Letztes Update</div>
                <div class="info-value" id="infoTime" style="font-size:13px;">--</div>
            </div>
        </div>

        <a href="https://www.roblox.com/games/7711635737" target="_blank" class="join-btn">
            🎮 JETZT BEITRETEN
        </a>

        <div class="refresh-footer">
            <span class="refresh-indicator"></span>
            <span>Live • Aktualisiert alle 30 Sekunden</span>
        </div>
        
        <div id="errorDisplay"></div>
    </div>

    <script>
        const API_URL = '/api/player-count';
        
        async function fetchPlayerData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('Fetch error:', error);
                throw error;
            }
        }

        async function updateUI() {
            const countEl = document.getElementById('countDisplay');
            const statusEl = document.getElementById('statusDisplay');
            const maxEl = document.getElementById('infoMax');
            const visitsEl = document.getElementById('infoVisits');
            const timeEl = document.getElementById('infoTime');
            const errorEl = document.getElementById('errorDisplay');
            
            try {
                const data = await fetchPlayerData();
                
                if (data.success) {
                    // 🎯 Spieleranzahl
                    countEl.textContent = data.playerCount;
                    
                    // 🟢 Status
                    if (data.playerCount > 0) {
                        statusEl.className = 'status-badge live';
                        statusEl.innerHTML = `<span class="status-dot"></span><span>${data.playerCount} SPIELER ONLINE</span>`;
                    } else {
                        statusEl.className = 'status-badge empty';
                        statusEl.innerHTML = '<span class="status-dot"></span><span>SERVER LEER</span>';
                    }
                    
                    // 📊 Details
                    maxEl.textContent = data.maxPlayers;
                    visitsEl.textContent = data.visits ? data.visits.toLocaleString('de-DE') : '--';
                    
                    // 🕐 Zeitstempel
                    const now = new Date(data.timestamp);
                    timeEl.textContent = now.toLocaleTimeString('de-DE', {
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });
                    
                    // Fehler leeren
                    errorEl.innerHTML = '';
                    
                    console.log(`✅ ${data.playerCount}/${data.maxPlayers} Spieler | ${data.visits?.toLocaleString('de-DE')} Besuche`);
                    
                } else {
                    throw new Error(data.error || 'Keine Daten vom Server');
                }
                
            } catch (error) {
                console.error('❌ Update fehlgeschlagen:', error);
                
                countEl.textContent = '--';
                statusEl.className = 'status-badge error';
                statusEl.innerHTML = '<span class="status-dot"></span><span>KEINE VERBINDUNG</span>';
                
                errorEl.innerHTML = `
                    <div class="error-box">
                        <strong>⚠️ Verbindungsfehler</strong><br>
                        ${error.message}<br>
                        <small>Der Server könnte vorübergehend nicht erreichbar sein.</small>
                    </div>
                `;
                
                timeEl.textContent = new Date().toLocaleTimeString('de-DE', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
            }
        }

        // 🚀 Start
        console.log('🚨 Notruf Hamburg RP - Monitor gestartet');
        console.log('🎮 Place ID: 7711635737');
        console.log('🔑 Server: x1qssipp');
        console.log('⏰ Auto-Update: Alle 30 Sekunden\n');
        
        updateUI();
        setInterval(updateUI, 30000); // Alle 30 Sekunden aktualisieren
    </script>
</body>
</html>
