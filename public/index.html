<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notruf Hamburg RP - Live Spieleranzahl</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: 
                radial-gradient(ellipse at top, rgba(0,100,255,0.1), transparent 50%),
                radial-gradient(ellipse at bottom, rgba(0,50,150,0.05), transparent 50%);
        }

        .container {
            background: #111118;
            border: 1px solid #222;
            border-radius: 20px;
            padding: 35px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 480px;
            width: 100%;
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20px;
            right: 20px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #0066ff, #0044cc, transparent);
        }

        .game-logo {
            font-size: 70px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 20px rgba(0,100,255,0.3));
        }

        h1 {
            color: white;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 3px;
            letter-spacing: -0.5px;
        }

        .game-subtitle {
            color: #0066ff;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        .server-badge {
            display: inline-block;
            background: rgba(0,100,255,0.1);
            color: #4488ff;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border: 1px solid rgba(0,100,255,0.2);
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 25px;
            transition: all 0.3s;
        }

        .status-indicator.live {
            background: rgba(46, 213, 115, 0.1);
            color: #2ed573;
            border: 1px solid rgba(46, 213, 115, 0.2);
        }

        .status-indicator.empty {
            background: rgba(255, 165, 0, 0.1);
            color: #ffa500;
            border: 1px solid rgba(255, 165, 0, 0.2);
        }

        .status-indicator.error {
            background: rgba(255, 50, 50, 0.1);
            color: #ff3232;
            border: 1px solid rgba(255, 50, 50, 0.2);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .count-display {
            background: linear-gradient(135deg, rgba(0,100,255,0.08), rgba(0,50,200,0.03));
            border: 2px solid rgba(0,100,255,0.15);
            border-radius: 20px;
            padding: 35px 20px;
            margin: 20px 0;
        }

        .big-number {
            font-size: 130px;
            font-weight: 900;
            background: linear-gradient(135deg, #0066ff, #4488ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 5px;
            transition: all 0.3s ease;
        }

        .big-label {
            color: #666;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }

        .stat-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid #1a1a25;
            border-radius: 12px;
            padding: 15px;
            text-align: left;
        }

        .stat-label {
            color: #555;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .stat-value {
            color: white;
            font-size: 18px;
            font-weight: 700;
        }

        .stat-value.code {
            color: #4488ff;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            word-break: break-all;
        }

        .join-button {
            display: inline-block;
            background: linear-gradient(135deg, #0066ff, #0044cc);
            color: white;
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            margin: 10px 0;
            transition: all 0.3s;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .join-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,100,255,0.3);
        }

        .auto-refresh {
            color: #444;
            font-size: 11px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .refresh-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #2ed573;
            animation: pulse 2s infinite;
        }

        .error-msg {
            background: rgba(255,50,50,0.05);
            border: 1px solid rgba(255,50,50,0.2);
            border-radius: 12px;
            padding: 12px;
            margin-top: 12px;
            color: #ff4444;
            font-size: 12px;
            line-height: 1.5;
        }

        .loading-ring {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0,100,255,0.1);
            border-top-color: #0066ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .container { padding: 25px 18px; }
            h1 { font-size: 24px; }
            .big-number { font-size: 90px; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-logo">🚨</div>
        <h1>Notruf Hamburg</h1>
        <div class="game-subtitle">Roleplay Server</div>
        <div class="server-badge" id="serverCodeDisplay">x1qssipp</div>
        
        <div id="statusIndicator" class="status-indicator live">
            <span class="pulse-dot"></span>
            <span>LÄDT...</span>
        </div>

        <div class="count-display">
            <div id="playerCountDisplay" class="big-number">
                <div class="loading-ring"></div>
            </div>
            <div class="big-label">Spieler Online</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Maximale Spieler</div>
                <div class="stat-value" id="maxPlayersStat">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Server Code</div>
                <div class="stat-value code">x1qssipp</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Besuche</div>
                <div class="stat-value" id="visitsStat">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Letztes Update</div>
                <div class="stat-value" id="updateTimeStat" style="font-size:13px;">--</div>
            </div>
        </div>

        <a href="https://www.roblox.com/share?v=v2&code=5ihdm3h6iozgyv" target="_blank" class="join-button">
            🎮 SERVER BEITRETEN
        </a>

        <div class="auto-refresh">
            <span class="refresh-dot"></span>
            <span>Live-Updates alle 30 Sekunden</span>
        </div>
        
        <div id="errorMessage"></div>
    </div>

    <script>
        async function getPlayerData() {
            const response = await fetch('/api/player-count');
            return await response.json();
        }

        async function refresh() {
            const countEl = document.getElementById('playerCountDisplay');
            const statusEl = document.getElementById('statusIndicator');
            const maxEl = document.getElementById('maxPlayersStat');
            const visitsEl = document.getElementById('visitsStat');
            const timeEl = document.getElementById('updateTimeStat');
            const errorEl = document.getElementById('errorMessage');
            
            try {
                const data = await getPlayerData();
                
                if (data.success) {
                    // Spieleranzahl anzeigen
                    countEl.textContent = data.playerCount;
                    
                    // Status aktualisieren
                    if (data.playerCount > 0) {
                        statusEl.className = 'status-indicator live';
                        statusEl.innerHTML = '<span class="pulse-dot"></span><span>ONLINE - ' + data.playerCount + ' Spieler</span>';
                    } else {
                        statusEl.className = 'status-indicator empty';
                        statusEl.innerHTML = '<span class="pulse-dot"></span><span>SERVER LEER</span>';
                    }
                    
                    // Statistiken
                    maxEl.textContent = data.maxPlayers;
                    visitsEl.textContent = data.visits ? data.visits.toLocaleString() : '--';
                    
                    // Zeit
                    const now = new Date(data.timestamp);
                    timeEl.textContent = now.toLocaleTimeString('de-DE', {
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });
                    
                    // Fehler löschen
                    errorEl.innerHTML = '';
                    
                    console.log('✅ Spieler:', data.playerCount, '/', data.maxPlayers);
                    
                } else {
                    throw new Error(data.error || 'Unbekannter Fehler');
                }
                
            } catch (error) {
                console.error('❌ Fehler:', error);
                
                countEl.textContent = '--';
                statusEl.className = 'status-indicator error';
                statusEl.innerHTML = '<span class="pulse-dot"></span><span>VERBINDUNGSFEHLER</span>';
                
                errorEl.innerHTML = `
                    <div class="error-msg">
                        ⚠️ ${error.message}<br>
                        <small>Bitte später erneut versuchen</small>
                    </div>
                `;
                
                timeEl.textContent = new Date().toLocaleTimeString('de-DE', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
            }
        }

        // Start
        refresh();
        setInterval(refresh, 30000);
        
        console.log('🚨 Notruf Hamburg RP - Monitor gestartet');
        console.log('🔑 Server: x1qssipp');
    </script>
</body>
</html>
